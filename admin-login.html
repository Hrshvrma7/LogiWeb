<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login | Sadhi Logistics</title>
    <style>
        body {
            background: #07003d;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 350px;
        }

        h2 {
            color: #07003d;
            margin-bottom: 20px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4361ee;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h2>Admin Portal</h2>
        <input type="email" id="email" placeholder="Admin Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="msg" style="color: red; font-size: 0.8rem; text-align: center; margin-top: 10px;"></p>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
       const SUPABASE_URL = 'https://pkukuuipfnhiqwxwqwes.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrdWt1dWlwZm5oaXF3eHdxd2VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NTc1MjAsImV4cCI6MjA4OTMzMzUyMH0.igxPWf0aGaIHyRnDqM_-abnUl7LuDXz1AJyMJqPY2Io';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await db.auth.signInWithPassword({ email, password });

            if (error) {
                document.getElementById('msg').innerText = "Invalid Credentials";
            } else {
                window.location.href = "admin.html"; // Redirect to your full updated HTML file
            }
        }
    </script>
</body>

</html>
